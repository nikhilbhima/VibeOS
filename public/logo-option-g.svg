<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="50%" style="stop-color:#c9a574"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0c0b0a"/>

  <!-- Concentric circles with break - like a radar/broadcast signal -->
  <g stroke="url(#goldG)" fill="none" stroke-linecap="round">
    <!-- Outer ring - broken -->
    <path d="M 256 76 A 180 180 0 1 1 136 136" stroke-width="10" opacity="0.3"/>

    <!-- Middle ring - broken -->
    <path d="M 256 116 A 140 140 0 1 1 156 156" stroke-width="12" opacity="0.5"/>

    <!-- Inner ring - broken -->
    <path d="M 256 156 A 100 100 0 1 1 186 186" stroke-width="14" opacity="0.7"/>

    <!-- Core circle -->
    <circle cx="256" cy="256" r="50" fill="url(#goldG)"/>
  </g>

  <!-- Broadcast lines -->
  <line x1="136" y1="136" x2="100" y2="100" stroke="url(#goldG)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
</svg>
