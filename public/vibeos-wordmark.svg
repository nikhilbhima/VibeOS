<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="wordmarkAuraGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#8338EC;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#3A86FF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3A86FF;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="wordmarkTextGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8338EC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A86FF;stop-opacity:1" />
    </linearGradient>

    <filter id="wordmarkAuraGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Circle -->
  <circle cx="30" cy="30" r="24" fill="url(#wordmarkAuraGradient)" filter="url(#wordmarkAuraGlow)"/>

  <!-- VibeOS Text -->
  <text x="65" y="40"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="28"
        font-weight="700"
        fill="url(#wordmarkTextGradient)">
    VibeOS
  </text>
</svg>
