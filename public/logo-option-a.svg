<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="50%" style="stop-color:#c9a574"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0c0b0a"/>

  <!-- Abstract neural/constellation pattern - represents AI/planning -->
  <g stroke="url(#goldA)" fill="none">
    <!-- Central hub -->
    <circle cx="256" cy="256" r="40" stroke-width="6"/>

    <!-- Orbital paths -->
    <circle cx="256" cy="256" r="100" stroke-width="2" opacity="0.3"/>
    <circle cx="256" cy="256" r="160" stroke-width="2" opacity="0.2"/>

    <!-- Connection lines radiating out -->
    <line x1="256" y1="216" x2="256" y2="120" stroke-width="4"/>
    <line x1="290" y1="240" x2="370" y2="180" stroke-width="4"/>
    <line x1="290" y1="272" x2="380" y2="320" stroke-width="4"/>
    <line x1="256" y1="296" x2="256" y2="392" stroke-width="4"/>
    <line x1="222" y1="272" x2="142" y2="320" stroke-width="4"/>
    <line x1="222" y1="240" x2="142" y2="180" stroke-width="4"/>

    <!-- Outer nodes -->
    <circle cx="256" cy="120" r="16" fill="url(#goldA)"/>
    <circle cx="370" cy="180" r="12" fill="url(#goldA)"/>
    <circle cx="380" cy="320" r="14" fill="url(#goldA)"/>
    <circle cx="256" cy="392" r="16" fill="url(#goldA)"/>
    <circle cx="142" cy="320" r="12" fill="url(#goldA)"/>
    <circle cx="142" cy="180" r="14" fill="url(#goldA)"/>
  </g>
</svg>
