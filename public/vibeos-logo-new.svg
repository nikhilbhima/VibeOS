<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b896"/>
      <stop offset="50%" style="stop-color:#c9a574"/>
      <stop offset="100%" style="stop-color:#a38968"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with subtle border -->
  <circle cx="256" cy="256" r="240" fill="#0c0b0a"/>
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.3"/>

  <!-- Abstract "V" mark formed by two converging lines with orbital ring -->
  <g filter="url(#glow)">
    <!-- Left stroke of V -->
    <path d="M 160 140 L 256 340" stroke="url(#goldGradient)" stroke-width="32" stroke-linecap="round"/>
    <!-- Right stroke of V -->
    <path d="M 352 140 L 256 340" stroke="url(#goldGradient)" stroke-width="32" stroke-linecap="round"/>

    <!-- Orbital ring around the V - represents "OS" / system -->
    <ellipse cx="256" cy="256" rx="140" ry="50" fill="none" stroke="url(#goldGradient)" stroke-width="8" opacity="0.6" transform="rotate(-20 256 256)"/>

    <!-- Small orb/node on the orbital path -->
    <circle cx="380" cy="210" r="14" fill="url(#goldGradient)"/>
  </g>
</svg>
