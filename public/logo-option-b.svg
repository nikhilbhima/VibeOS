<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="100%" style="stop-color:#a38968"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0c0b0a"/>

  <!-- Stacked layers/cards - represents planning phases -->
  <g fill="url(#goldB)">
    <!-- Back layer -->
    <rect x="120" y="100" width="272" height="180" rx="20" opacity="0.2"/>
    <!-- Middle layer -->
    <rect x="100" y="140" width="272" height="180" rx="20" opacity="0.4"/>
    <!-- Front layer -->
    <rect x="80" y="180" width="272" height="180" rx="20" opacity="0.7"/>
    <!-- Top layer with detail -->
    <rect x="60" y="220" width="272" height="180" rx="20"/>

    <!-- Lines on top card representing content -->
    <rect x="90" y="260" width="160" height="12" rx="6" fill="#0c0b0a" opacity="0.5"/>
    <rect x="90" y="290" width="120" height="12" rx="6" fill="#0c0b0a" opacity="0.5"/>
    <rect x="90" y="320" width="180" height="12" rx="6" fill="#0c0b0a" opacity="0.5"/>
  </g>

  <!-- Sparkle/magic element -->
  <circle cx="380" cy="160" r="8" fill="url(#goldB)"/>
  <circle cx="400" cy="130" r="5" fill="url(#goldB)" opacity="0.6"/>
  <circle cx="360" cy="140" r="4" fill="url(#goldB)" opacity="0.4"/>
</svg>
