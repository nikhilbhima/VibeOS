<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="faviconAuraGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#8338EC;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#3A86FF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3A86FF;stop-opacity:0" />
    </radialGradient>

    <filter id="faviconAuraGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Aura gradient circle -->
  <circle cx="32" cy="32" r="28" fill="url(#faviconAuraGradient)" filter="url(#faviconAuraGlow)"/>
</svg>
