<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b896"/>
      <stop offset="100%" style="stop-color:#a38968"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0c0b0a"/>

  <!-- Abstract "flow" - curved paths representing workflow/process -->
  <g stroke="url(#goldF)" fill="none" stroke-linecap="round">
    <!-- Main flow curve -->
    <path
      d="M 100 300 C 150 100, 250 100, 256 256 C 262 412, 362 412, 412 300"
      stroke-width="32"
    />

    <!-- Start node -->
    <circle cx="100" cy="300" r="20" fill="url(#goldF)"/>

    <!-- End node with arrow indication -->
    <circle cx="412" cy="300" r="20" fill="url(#goldF)"/>

    <!-- Mid-flow accent dots -->
    <circle cx="200" cy="140" r="8" fill="url(#goldF)" opacity="0.5"/>
    <circle cx="312" cy="372" r="8" fill="url(#goldF)" opacity="0.5"/>
  </g>
</svg>
