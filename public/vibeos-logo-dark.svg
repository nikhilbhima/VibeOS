<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="darkAuraGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#8338EC;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#3A86FF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3A86FF;stop-opacity:0" />
    </radialGradient>

    <filter id="darkAuraGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Aura gradient circle -->
  <circle cx="24" cy="24" r="20" fill="url(#darkAuraGradient)" filter="url(#darkAuraGlow)"/>
</svg>
