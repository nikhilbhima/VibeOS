<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <circle cx="24" cy="24" r="20" fill="url(#retroGlow)" opacity="0.3"/>

  <!-- Main V shape with gradient and depth -->
  <defs>
    <linearGradient id="retroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8338EC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A86FF;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="retroGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#3A86FF;stop-opacity:0.5" />
    </linearGradient>

    <linearGradient id="chromeEffect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FF006E;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#3A86FF;stop-opacity:0.3" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer V (shadow/depth layer) -->
  <path d="M14 11 L24 35 L34 11"
        stroke="#8338EC"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.4"
        transform="translate(1, 1)"/>

  <!-- Main V with gradient -->
  <path d="M14 11 L24 35 L34 11"
        stroke="url(#retroGradient)"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#glow)"/>

  <!-- Chrome highlight on V -->
  <path d="M14 11 L24 35 L34 11"
        stroke="url(#chromeEffect)"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.6"/>

  <!-- Retro grid lines accent -->
  <line x1="10" y1="38" x2="20" y2="40" stroke="#FF006E" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="40" x2="38" y2="38" stroke="#3A86FF" stroke-width="1" opacity="0.4"/>
  <line x1="15" y1="40" x2="18" y2="42" stroke="#8338EC" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="42" x2="33" y2="40" stroke="#8338EC" stroke-width="0.5" opacity="0.3"/>

  <!-- Neon dots -->
  <circle cx="24" cy="37" r="1.5" fill="url(#retroGradient)" filter="url(#glow)"/>
  <circle cx="24" cy="37" r="2.5" fill="url(#retroGradient)" opacity="0.2"/>
</svg>
